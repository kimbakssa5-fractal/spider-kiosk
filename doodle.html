<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Fractal Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c9a25a; --gold-lt:#ecd49a; --gold-dk:#8a6d32;
    --teal:#2f6f63; --teal-dk:#173d37;
    --noto: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background:
      radial-gradient(900px 600px at 50% -10%, rgba(201,162,90,0.10), transparent 60%),
      linear-gradient(160deg, #1a322e, #0e1c1b 70%);
    overflow: hidden;
    font-family: var(--noto);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas#c {
    background: #ffffff;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    cursor: none;
    touch-action: none;
  }

  /* ── 상단 텍스트 메뉴 (fractal_3.png 시안 기반) ─────────────
     새 도화지 - 색 | 이미지 불러오기 - 투명도 | 실행취소 - 재실행
     | 선 굵기 - 색 | 보조선 굵기 - 색 | 전체화면 | 끝내기            */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 9px 12px;
    /* 시안처럼 위는 어둡고 아래로 갈수록 옅어지는 그라데이션 */
    background: linear-gradient(180deg, rgba(8,14,13,0.97) 0%, rgba(14,28,27,0.82) 60%, rgba(14,28,27,0) 100%);
    transition: transform 0.25s ease;
  }
  #toolbar.hidden { transform: translateY(-100%); }

  #menu {
    display: flex;
    align-items: center;
    /* 들어가면 가운데, 넘치면 앞(왼쪽)부터 보이게 — 양 끝 잘림 방지 */
    justify-content: safe center;
    flex-wrap: nowrap;            /* 항상 한 줄 — 넘치면 가로 스크롤 */
    gap: 8px;
    overflow-x: auto;
    white-space: nowrap;
    color: var(--gold-lt);
  }
  #menu::-webkit-scrollbar { display: none; }

  .grp { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
  /* 실행취소·재실행: 가로 스크롤과 무관하게 항상 왼쪽에 고정 */
  .grp.pinned {
    position: sticky;
    left: 0;
    z-index: 3;
    padding-right: 12px;
    margin-right: 2px;
    background: linear-gradient(90deg,
      rgba(8,14,13,0.98) 0%, rgba(8,14,13,0.98) 72%, rgba(8,14,13,0) 100%);
  }
  .div { color: rgba(236,212,154,0.35); font-weight: 100; padding: 0 2px; }
  .sep { color: rgba(236,212,154,0.5); font-weight: 100; }

  #menu button {
    background: none;
    border: none;
    color: var(--gold-lt);
    font-family: var(--noto);
    font-weight: 400;
    font-size: 13px;
    padding: 4px 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  #menu button:hover { color: #fff; }
  #menu button:active { color: var(--gold); }
  #menu button:disabled { opacity: 0.3; cursor: default; }
  /* 슬라이더 항목이 선택된 상태(시안의 '선 굵기' 굵게 강조) */
  #menu button.slbtn.active { color: #fff; font-weight: 700; }

  #menu .ctl {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--noto);
    font-weight: 300;
    font-size: 13px;
    color: var(--gold-lt);
    white-space: nowrap;
  }

  /* ── 하단 슬라이더 부메뉴 (fractal_4.png): 항목 클릭 시 펼쳐짐 ── */
  #sliderRow {
    margin-top: 8px;
    padding: 2px 6px 4px;
  }
  #sliderRow.closed { display: none; }
  #sliderRow input[type="range"] {
    display: block;
    width: 100%;
    height: 26px;
  }

  input[type="range"] {
    width: 78px; height: 22px;
    accent-color: var(--gold);
    touch-action: none;
    vertical-align: middle;
  }
  input[type="color"] {
    width: 26px; height: 20px;
    border: 1px solid #555; border-radius: 4px;
    background: none; padding: 0; cursor: pointer;
  }
  input[type="file"] { display: none; }

  /* 메뉴 다시 열기 탭 (시안의 ▼ 표시) */
  #showTab {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    color: var(--red, #d8423a);
    background: rgba(8,14,13,0.85);
    font-size: 13px;
    padding: 2px 22px 4px;
    border-radius: 0 0 10px 10px;
    cursor: pointer;
    z-index: 99;
    display: none;
  }
  #toolbar.hidden ~ #showTab { display: block; }

  /* 커스텀 커서 */
  #cursor {
    position: fixed;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.35);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999;
    display: none;
  }

  /* 중앙 안내문 — 시안대로 Noto Sans Thin, 그리기 시작하면 사라짐 */
  #hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--noto);
    font-weight: 100;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: rgba(0,0,0,0.4);
    pointer-events: none;
    z-index: 50;
    text-align: center;
    transition: opacity 0.3s ease;
  }
  #hint.gone { opacity: 0; }

  @media (max-width: 760px) {
    #menu { gap: 6px; }
    #menu button, #menu .ctl { font-size: 12px; }
    input[type="range"] { width: 64px; }
    #cursor { display: none !important; }
  }
</style>
</head>
<body>

<div id="stage"><canvas id="c"></canvas></div>

<!-- 상단 텍스트 메뉴: fractal_3.png 시안 그대로 -->
<div id="toolbar">
  <div id="menu">
    <div class="grp pinned">
      <button id="btnUndo" title="실행취소 (Ctrl+Z)">실행취소</button>
      <span class="sep">-</span>
      <button id="btnRedo" title="재실행 (Ctrl+Y)">재실행</button>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button id="btnNew" title="새 도화지 (Ctrl+N)">새 도화지</button>
      <span class="sep">-</span>
      <label class="ctl">색 <input type="color" id="paperC" value="#ffffff" title="도화지 색"></label>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button id="btnOpen" title="이미지 불러오기 (Ctrl+O)">이미지 불러오기</button>
      <span class="sep">-</span>
      <button class="slbtn" data-ctl="imgAlpha" title="불러온 이미지 투명도">투명도</button>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button class="slbtn" data-ctl="mainW">선 굵기</button>
      <span class="sep">-</span>
      <label class="ctl">색 <input type="color" id="mainC" value="#000000"></label>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button class="slbtn" data-ctl="subW">보조선 굵기</button>
      <span class="sep">-</span>
      <label class="ctl">색 <input type="color" id="subC" value="#000000"></label>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button id="btnFull" title="전체화면">전체화면</button>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button id="btnSave" title="PNG로 저장 (Ctrl+S)">저장</button>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button id="btnShare" title="이미지 공유">공유</button>
    </div>
    <span class="div">|</span>
    <div class="grp">
      <button id="btnClose" title="끝내기">끝내기</button>
    </div>
  </div>
  <!-- 하단 부메뉴: 슬라이더 항목(투명도·선 굵기·보조선 굵기)을 누르면 펼쳐짐 -->
  <div id="sliderRow" class="closed">
    <input type="range" id="slider">
  </div>
</div>

<div id="showTab">▼</div>

<div id="cursor"></div>
<div id="hint">드래그하거나 점을 찍으면 프랙탈 선이 그려집니다</div>
<input type="file" id="fileInput" accept="image/*">

<script>
(() => {
  'use strict';

  const $ = id => document.getElementById(id);
  const toolbar = $('toolbar');
  const hintEl = $('hint');

  // ── 도화지: 화면(표시 영역)을 꽉 채우는 자동 크기 ──────────
  // 기기 해상도(screen.width/height)가 아닌 실제 표시 영역
  // (visualViewport − 툴바) × DPR 로 잡아 도화지가 화면을 가득 채움.
  function displaySize() {
    const dpr = window.devicePixelRatio || 1;
    const vv = window.visualViewport;
    const tb = $('toolbar');
    const cssW = vv ? vv.width : window.innerWidth;
    const tbH = (tb && !tb.classList.contains('hidden')) ? tb.offsetHeight : 0;
    const cssH = (vv ? vv.height : window.innerHeight) - tbH;
    return { W: Math.max(1, Math.round(cssW * dpr)), H: Math.max(1, Math.round(cssH * dpr)) };
  }
  let { W, H } = displaySize();

  const canvas = $('c');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  canvas.width = W;
  canvas.height = H;

  const cursor = $('cursor');

  // ── 설정값 ────────────────────────────────────────────────
  const cfg = {
    mainW: 0.5,
    subW: 0.3,
    mainC: '#000000',
    subC: '#000000',
    paperC: '#ffffff',
    radius: 250,
    rays: 16,
    erase: false,
    imgAlpha: 1   // 불러온 이미지 투명도(0~1)
  };

  // ── 상태 ──────────────────────────────────────────────────
  let isDrawing = false;
  let oldx = 0, oldy = 0;
  let dirty = false;

  // 불러온 이미지(투명도 실시간 조절용)
  let loadedImg = null;
  let preLoadSnapshot = null;

  // ── Undo / Redo ───────────────────────────────────────────
  const undoStack = [];
  const redoStack = [];
  const MAX_HISTORY = 30;

  function snapshot() {
    undoStack.push(ctx.getImageData(0, 0, W, H));
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack.length = 0;
    updateHistoryButtons();
  }
  function undo() {
    if (!undoStack.length) return;
    redoStack.push(ctx.getImageData(0, 0, W, H));
    ctx.putImageData(undoStack.pop(), 0, 0);
    updateHistoryButtons();
  }
  function redo() {
    if (!redoStack.length) return;
    undoStack.push(ctx.getImageData(0, 0, W, H));
    ctx.putImageData(redoStack.pop(), 0, 0);
    updateHistoryButtons();
  }
  function updateHistoryButtons() {
    $('btnUndo').disabled = !undoStack.length;
    $('btnRedo').disabled = !redoStack.length;
  }

  function hideHint() { hintEl.classList.add('gone'); }

  // ── 색상 유틸 ─────────────────────────────────────────────
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ── 거미줄 광선 (원본 AS3 drawStar 포팅) ──────────────────
  function drawStar(mx, my) {
    const r = cfg.radius;
    const bx = Math.max(0, Math.floor(mx - r));
    const by = Math.max(0, Math.floor(my - r));
    const bw = Math.min(W, Math.ceil(mx + r)) - bx;
    const bh = Math.min(H, Math.ceil(my + r)) - by;
    if (bw <= 0 || bh <= 0) return;
    const img = ctx.getImageData(bx, by, bw, bh);
    const data = img.data;

    function hasInk(x, y) {
      const ix = Math.round(x) - bx, iy = Math.round(y) - by;
      if (ix < 0 || iy < 0 || ix >= bw || iy >= bh) return false;
      return data[(iy * bw + ix) * 4 + 3] > 0;
    }

    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = cfg.subC;
    ctx.lineWidth = cfg.subW;
    ctx.beginPath();

    for (let i = 0; i < cfg.rays; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dx = Math.cos(angle), dy = Math.sin(angle);
      let px = mx, py = my;
      let hitX = 0, hitY = 0, hit = false;

      for (let d = 0; d < r; d++) {
        px += dx; py += dy;
        if (hasInk(px, py)) { hitX = px; hitY = py; hit = true; }
      }
      if (hit) {
        ctx.moveTo(mx, my);
        ctx.lineTo(hitX, hitY);
      }
    }
    ctx.stroke();
    ctx.restore();
  }

  // ── 필압 → 굵기 계수 ──────────────────────────────────────
  let penFactor = 1;
  function setPen(e) {
    penFactor = (e && e.pointerType === 'pen' && e.pressure > 0)
      ? 1 + e.pressure * 2.5
      : 1;
  }

  // ── 메인 선 ───────────────────────────────────────────────
  function drawLine(x1, y1, x2, y2) {
    ctx.save();
    ctx.strokeStyle = hexToRgba(cfg.mainC, 0.8);
    ctx.lineWidth = cfg.mainW * penFactor;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  // ── 좌표 변환 ─────────────────────────────────────────────
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = W / r.width, sy = H / r.height;
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy };
  }

  // ── 입력 이벤트 ───────────────────────────────────────────
  function pointerDown(e) {
    const p = getPos(e);
    setPen(e);
    hideHint();
    loadedImg = null;        // 그리기 시작 → 이미지 투명도 조절 종료(현재 상태 확정)
    snapshot();
    oldx = p.x; oldy = p.y;
    isDrawing = true;
    dirty = true;
    drawStar(p.x, p.y);
  }
  function pointerMove(e) {
    if (!isDrawing) return;
    const p = getPos(e);
    setPen(e);
    drawStar(p.x, p.y);
    drawLine(oldx, oldy, p.x, p.y);
    oldx = p.x; oldy = p.y;
  }
  function pointerUp(e) {
    if (!isDrawing) return;
    isDrawing = false;
    if (e && !e.touches) {
      const p = getPos(e);
      drawStar(p.x, p.y); drawLine(oldx, oldy, p.x, p.y);
    }
  }

  function moveCursor(e) {
    cursor.style.display = 'block';
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  }
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (canvas.setPointerCapture) { try { canvas.setPointerCapture(e.pointerId); } catch (_) {} }
    moveCursor(e);
    pointerDown(e);
  });
  canvas.addEventListener('pointermove', e => {
    e.preventDefault();
    moveCursor(e);
    pointerMove(e);
  });
  canvas.addEventListener('pointerup', e => { e.preventDefault(); pointerUp(e); });
  canvas.addEventListener('pointercancel', () => pointerUp(null));
  canvas.addEventListener('pointerleave', () => { if (!isDrawing) cursor.style.display = 'none'; });

  // ── 새 도화지 ─────────────────────────────────────────────
  function newPaper() {
    if (dirty && !confirm('현재 그림을 지우고 새 도화지를 만들까요?')) return;
    ({ W, H } = displaySize());
    canvas.width = W;
    canvas.height = H;
    cfg.erase = false;
    loadedImg = null;
    undoStack.length = 0;
    redoStack.length = 0;
    dirty = false;
    hintEl.classList.remove('gone');
    updateHistoryButtons();
    fit();
  }

  // ── 이미지 불러오기 (+ 투명도) ────────────────────────────
  const fileInput = $('fileInput');
  function openImage() { fileInput.click(); }

  function drawLoadedImage() {
    if (!loadedImg || !preLoadSnapshot) return;
    ctx.putImageData(preLoadSnapshot, 0, 0);   // 이미지 올리기 직전 상태로 복원
    const s = Math.min(W / loadedImg.width, H / loadedImg.height, 1);
    const dw = loadedImg.width * s, dh = loadedImg.height * s;
    ctx.save();
    ctx.globalAlpha = cfg.imgAlpha;
    ctx.drawImage(loadedImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
    ctx.restore();
  }

  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => {
      snapshot();
      preLoadSnapshot = ctx.getImageData(0, 0, W, H);
      loadedImg = img;
      hideHint();
      drawLoadedImage();          // 현재 투명도로 그리기 (이후 슬라이더로 실시간 조절)
      dirty = true;
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(f);
    fileInput.value = '';
  });

  // ── 저장 / 공유 ───────────────────────────────────────────
  // 도화지 색을 깔아 합성한 결과 캔버스를 만든다(투명 배경 PNG 방지)
  function composite() {
    const out = document.createElement('canvas');
    out.width = W; out.height = H;
    const octx = out.getContext('2d');
    octx.fillStyle = cfg.paperC;
    octx.fillRect(0, 0, W, H);
    octx.drawImage(canvas, 0, 0);
    return out;
  }
  function exportName() {
    const t = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `fractal_${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}.png`;
  }
  function saveImage() {
    const a = document.createElement('a');
    a.download = exportName();
    a.href = composite().toDataURL('image/png');
    a.click();
    dirty = false;
  }
  // 공유: 모바일 네이티브 공유(카톡·메시지 등). 미지원 시 저장으로 폴백.
  async function shareImage() {
    const out = composite();
    const blob = await new Promise(r => out.toBlob(r, 'image/png'));
    const file = new File([blob], exportName(), { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Fractal Canvas' });
        dirty = false;
      } catch (_) { /* 사용자가 공유 취소 */ }
    } else {
      saveImage();
      alert('이 브라우저는 직접 공유를 지원하지 않아 이미지를 저장했습니다.');
    }
  }

  // ── 끝내기 ────────────────────────────────────────────────
  function closeApp() {
    if (dirty && !confirm('저장하지 않은 그림이 있습니다. 닫을까요?')) return;
    ctx.clearRect(0, 0, W, H);
    dirty = false;
    location.href = 'index.html';
  }

  // ── 색상 컨트롤 (스와치, 인라인 유지) ─────────────────────
  $('mainC').addEventListener('input', e => { cfg.mainC = e.target.value; });
  $('subC').addEventListener('input',  e => { cfg.subC = e.target.value; });
  $('paperC').addEventListener('input', e => {
    cfg.paperC = e.target.value;
    canvas.style.background = e.target.value;
  });

  // ── 하단 슬라이더 부메뉴 (fractal_4.png) ──────────────────
  // 슬라이더 항목을 누르면 메뉴 아래에 전체폭 슬라이더가 펼쳐짐.
  // 같은 항목 재클릭 = 닫기, 다른 항목 클릭 = 전환.
  const sliderRow = $('sliderRow');
  const slider = $('slider');
  const ctlDefs = {
    imgAlpha: { min: 0,    max: 100, step: 1,    get: () => Math.round(cfg.imgAlpha * 100), set: v => { cfg.imgAlpha = v / 100; drawLoadedImage(); } },
    mainW:    { min: 0.1,  max: 3,   step: 0.1,  get: () => cfg.mainW, set: v => { cfg.mainW = v; } },
    subW:     { min: 0.05, max: 2,   step: 0.05, get: () => cfg.subW,  set: v => { cfg.subW = v; } }
  };
  let activeCtl = null;
  const slbtns = Array.from(document.querySelectorAll('.slbtn'));

  function openSlider(k) {
    const d = ctlDefs[k]; if (!d) return;
    activeCtl = k;
    slider.min = d.min; slider.max = d.max; slider.step = d.step; slider.value = d.get();
    sliderRow.classList.remove('closed');
    slbtns.forEach(b => b.classList.toggle('active', b.dataset.ctl === k));
    fit();
  }
  function closeSlider() {
    activeCtl = null;
    sliderRow.classList.add('closed');
    slbtns.forEach(b => b.classList.remove('active'));
    fit();
  }
  slbtns.forEach(b => b.addEventListener('click', () => {
    const k = b.dataset.ctl;
    (activeCtl === k) ? closeSlider() : openSlider(k);
  }));
  slider.addEventListener('input', e => { if (activeCtl) ctlDefs[activeCtl].set(+e.target.value); });

  $('btnNew').addEventListener('click', newPaper);
  $('btnOpen').addEventListener('click', openImage);
  $('btnSave').addEventListener('click', saveImage);
  $('btnShare').addEventListener('click', shareImage);
  $('btnClose').addEventListener('click', closeApp);
  $('btnUndo').addEventListener('click', undo);
  $('btnRedo').addEventListener('click', redo);

  // 전체화면: 표준 + webkit 폴백, 미지원 시 메뉴 숨김으로 유사 전체화면
  const docEl = document.documentElement;
  const fsRequest = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
  const fsExit = document.exitFullscreen || document.webkitExitFullscreen;
  const fsElement = () => document.fullscreenElement || document.webkitFullscreenElement;
  $('btnFull').addEventListener('click', () => {
    if (!fsRequest) { toolbar.classList.toggle('hidden'); fit(); return; }
    if (fsElement()) fsExit.call(document);
    else fsRequest.call(docEl);
  });
  $('showTab').addEventListener('click', () => { toolbar.classList.remove('hidden'); fit(); });

  // 단축키
  window.addEventListener('keydown', e => {
    if (!e.ctrlKey) return;
    const k = e.key.toLowerCase();
    if (k === 'z') { e.preventDefault(); undo(); }
    else if (k === 'y') { e.preventDefault(); redo(); }
    else if (k === 's') { e.preventDefault(); saveImage(); }
    else if (k === 'n') { e.preventDefault(); newPaper(); }
    else if (k === 'o') { e.preventDefault(); openImage(); }
  });

  // ── 화면 맞춤 (도화지가 표시 영역을 가득 채움) ───────────────
  function fit() {
    const vv = window.visualViewport;
    const tbH = toolbar.classList.contains('hidden') ? 0 : toolbar.offsetHeight;
    const availW = vv ? vv.width : window.innerWidth;
    const availH = (vv ? vv.height : window.innerHeight) - tbH;
    const s = Math.min(availW / W, availH / H);
    canvas.style.width = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
    $('stage').style.top = tbH + 'px';
    $('stage').style.height = availH + 'px';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', () => setTimeout(fit, 250));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);
  new ResizeObserver(fit).observe(toolbar);
  fit();
  updateHistoryButtons();

})();
</script>
</body>
</html>
