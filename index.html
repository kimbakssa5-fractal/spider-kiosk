<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fractal Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0b0a09;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* 이미지 비율(1080:1920)에 정확히 맞춘 무대 — 레터박스 없음 */
  .stage {
    position: relative;
    width: min(100vw, calc(100vh * 1080 / 1920));
    aspect-ratio: 1080 / 1920;
    background: #0b0a09;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);
  }
  .stage img.bg {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* 클릭 핫스팟 (퍼센트 좌표) */
  a.hot {
    position: absolute;
    display: block;
    border-radius: 18px;
    text-decoration: none;
    transition: box-shadow .18s ease, background .18s ease, transform .12s ease;
  }
  a.hot:hover,
  a.hot:focus {
    background: radial-gradient(circle at center, rgba(236,212,154,0.18), transparent 70%);
    box-shadow: 0 0 0 1.5px rgba(236,212,154,0.6), 0 0 26px rgba(201,162,90,0.45);
  }
  a.hot:active { transform: scale(0.97); }

  /* 떠있는 오브젝트 영역 */
  .obj-canvas { left: 13%; top:  6%; width: 29%; height: 22%; border-radius: 40% 40% 30% 30%; }
  .obj-photo  { left: 46%; top:  9%; width: 32%; height: 16%; }
  .obj-mosaic { left: 13%; top: 31%; width: 29%; height: 19%; }
  .obj-zoom   { left: 54%; top: 34%; width: 28%; height: 17%; border-radius: 50%; }

  /* 하단 텍스트 라벨 영역 */
  .txt { left: 4%; width: 46%; height: 3.6%; border-radius: 10px; }
  .txt-canvas { top: 71.4%; }
  .txt-photo  { top: 75.0%; }
  .txt-mosaic { top: 79.2%; }
  .txt-zoom   { top: 82.8%; }

  /* 접근성용 라벨 숨김 */
  .sr { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
</style>
</head>
<body>
  <div class="stage">
    <img class="bg" src="01020304.png" alt="Fractal Universe 메뉴" loading="eager">

    <!-- 오브젝트 핫스팟 -->
    <a class="hot obj-canvas" href="doodle.html"><span class="sr">01 fractal canvas — 거미줄 낙서장</span></a>
    <a class="hot obj-photo"  href="https://kimbakssa5-fractal.github.io/photo-guestbook/"><span class="sr">02 fractal photo — 포토 방명록</span></a>
    <a class="hot obj-mosaic" href="triangle.html"><span class="sr">03 fractal mosaic — 삼각형 모자익</span></a>
    <a class="hot obj-zoom"   href="fractal.html"><span class="sr">04 fractal zoom — 무한 프랙탈 줌</span></a>

    <!-- 텍스트 라벨 핫스팟 -->
    <a class="hot txt txt-canvas" href="doodle.html"></a>
    <a class="hot txt txt-photo"  href="https://kimbakssa5-fractal.github.io/photo-guestbook/"></a>
    <a class="hot txt txt-mosaic" href="triangle.html"></a>
    <a class="hot txt txt-zoom"   href="fractal.html"></a>
  </div>
</body>
</html>
